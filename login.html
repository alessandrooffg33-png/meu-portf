<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso | Fitness Digital</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --bg: #0d1117; --card: #161b22; --primary: #ff4500; --text: #f0f6fc; --border: #30363d; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        .box { background: var(--card); padding: 2.5rem; border-radius: 12px; width: 380px; border: 1px solid var(--border); text-align: center; position: relative; }
        .input-f { display: flex; align-items: center; background: #090b10; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; padding: 0 15px; }
        .input-f input { width: 100%; background: transparent; border: none; padding: 12px; color: white; outline: none; }
        .btn { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:disabled { opacity: 0.5; }
        .hidden { display: none !important; }
        .link { color: var(--primary); cursor: pointer; text-decoration: none; font-size: 0.9rem; margin-top: 15px; display: block; }

        /* --- ESTILOS DA CELEBRAÇÃO --- */
        .celebration-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(13, 17, 23, 0.98); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 0.8s ease;
        }
        .boneco { font-size: 5rem; color: var(--primary); animation: pular 0.6s infinite alternate; }
        .msg-boas-vindas { 
            margin-top: 20px; font-size: 1.8rem; font-weight: bold; text-align: center;
            background: linear-gradient(45deg, #ff4500, #fff); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; animation: brilhar 2s infinite;
        }
        @keyframes pular { from { transform: translateY(0); } to { transform: translateY(-30px); } }
        @keyframes brilhar { 0%, 100% { filter: drop-shadow(0 0 5px #ff4500); } 50% { filter: drop-shadow(0 0 20px #ff4500); } }
    </style>
</head>
<body>

    <div class="box">
        <div id="v-login">
            <h1 style="margin-bottom:20px">Bem-vindo</h1>
            <div class="input-f"><input type="email" id="l-email" placeholder="E-mail"></div>
            <div class="input-f"><input type="password" id="l-pass" placeholder="Senha"></div>
            <button class="btn" onclick="app.login()">Entrar</button>
            <a class="link" onclick="app.show('v-reg')">Criar conta</a>
        </div>

        <div id="v-reg" class="hidden">
            <h1>Cadastro</h1>
            <div class="input-f"><input type="text" id="r-name" placeholder="Nome Completo"></div>
            <div class="input-f"><input type="email" id="r-email" placeholder="Seu E-mail"></div>
            <div class="input-f"><input type="password" id="r-pass" placeholder="Crie uma Senha"></div>
            <button id="btn-send" class="btn" onclick="app.send()">Receber Código</button>
            <a class="link" onclick="app.show('v-login')">Voltar</a>
        </div>

        <div id="v-verify" class="hidden">
            <h1>Verificação</h1>
            <p style="margin-bottom:15px; color:#8b949e">Digite o código enviado</p>
            <div class="input-f"><input type="text" id="v-code" placeholder="0000" maxlength="4"></div>
            <button class="btn" onclick="app.verify()">Validar</button>
        </div>
    </div>

    <script>
        // CONFIGURAÇÕES
        const S_ID = "service_02cnn9m"; 
        const T_ID = "template_xbvitz7"; 
        const P_KEY = "A94D8kxYoXGumoWzG"; 

        emailjs.init(P_KEY);

        const app = {
            temp: {}, code: null,
            show: (id) => {
                ["v-login", "v-reg", "v-verify"].forEach(v => document.getElementById(v).classList.add('hidden'));
                document.getElementById(id).classList.remove('hidden');
            },
            send: () => {
                const name = document.getElementById('r-name').value;
                const email = document.getElementById('r-email').value;
                if(!name || !email) return alert("Preencha os campos!");

                app.temp = { name, email, pass: document.getElementById('r-pass').value };
                app.code = Math.floor(1000 + Math.random() * 9000).toString();
                document.getElementById('btn-send').innerText = "Enviando...";

                emailjs.send(S_ID, T_ID, {
                    user_name: app.temp.name,
                    verification_code: app.code,
                    email: app.temp.email 
                }).then(() => { app.show('v-verify'); })
                .catch(err => { alert("Erro de envio. Verifique o console."); });
            },
            verify: () => {
                if(document.getElementById('v-code').value === app.code) {
                    localStorage.setItem(app.temp.email, JSON.stringify(app.temp));
                    app.celebrate(); // CHAMA A ANIMAÇÃO
                } else { alert("❌ Código incorreto!"); }
            },
            celebrate: () => {
                const html = `
                    <div id="overlay" class="celebration-overlay">
                        <div class="boneco"><i class="fas fa-child"></i></div>
                        <div class="msg-boas-vindas">Bem-vindo ao mundo da programação</div>
                    </div>`;
                document.body.insertAdjacentHTML('beforeend', html);
                setTimeout(() => {
                    document.getElementById('overlay').style.opacity = '0';
                    setTimeout(() => { 
                        document.getElementById('overlay').remove(); 
                        app.show('v-login'); 
                    }, 800);
                }, 3000);
            },
            login: () => {
                const email = document.getElementById('l-email').value;
                const user = JSON.parse(localStorage.getItem(email));
                if(user && user.pass === document.getElementById('l-pass').value) {
                    alert(`🎉 Bem-vindo, ${user.name}!`);
                } else { alert("❌ Dados inválidos."); }
            }
        };
    </script>
</body>
</html>
